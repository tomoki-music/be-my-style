name: Rails CI/CD

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_assets_clobber:
        description: '本番assetsをclobberしてからprecompileする（古いassets残留でデザイン崩れが起きた場合のみ使用）'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
    - name: Deploy
      env:
        EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY || secrets.PRIVATE_KEY }}
        EC2_USER: ${{ secrets.EC2_USER || 'ec2-user' }}
        EC2_HOST: ${{ secrets.EC2_HOST || '13.113.0.43' }}
        DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || '/home/ec2-user/be-my-style' }}
        FORCE_ASSETS_CLOBBER: ${{ github.event.inputs.force_assets_clobber || 'false' }}
      run: |
        set -euo pipefail

        test -n "$EC2_SSH_KEY"
        test -n "$EC2_USER"
        test -n "$EC2_HOST"
        test -n "$DEPLOY_PATH"

        echo "$EC2_SSH_KEY" > private_key
        chmod 600 private_key

        ssh \
          -o StrictHostKeyChecking=no \
          -o ServerAliveInterval=30 \
          -o ServerAliveCountMax=20 \
          -i private_key \
          "${EC2_USER}@${EC2_HOST}" "DEPLOY_PATH='${DEPLOY_PATH}' FORCE_ASSETS_CLOBBER='${FORCE_ASSETS_CLOBBER}' bash -s" << 'EOF'
          set -euo pipefail

          echo "Host: $(hostname)"
          echo "Deploy path: ${DEPLOY_PATH}"
          DEPLOY_STARTED_AT=$(date +%s)
          echo "[deploy] START: $(date '+%H:%M:%S')"
          echo "[deploy] FORCE_ASSETS_CLOBBER: ${FORCE_ASSETS_CLOBBER:-false}"

          log_step_start() {
            echo "[deploy] $1 start: $(date '+%H:%M:%S')"
          }

          log_step_finish() {
            step_name="$1"
            step_started_at="$2"
            step_finished_at=$(date +%s)
            echo "[deploy] ${step_name} finished: $(date '+%H:%M:%S') ($((step_finished_at - step_started_at))s)"
          }

          cd "${DEPLOY_PATH}"

          PREV_COMMIT=$(git rev-parse HEAD)
          echo "[deploy] Before: ${PREV_COMMIT}"

          GIT_UPDATE_STARTED_AT=$(date +%s)
          log_step_start "git update"
          git fetch origin main
          git reset --hard origin/main
          log_step_finish "git update" "$GIT_UPDATE_STARTED_AT"

          NEW_COMMIT=$(git rev-parse HEAD)
          echo "[deploy] After: ${NEW_COMMIT}"

          CHANGED_FILES="$(git diff --name-only "$PREV_COMMIT" "$NEW_COMMIT" || true)"
          CHANGED_FILE_COUNT=$(printf '%s\n' "$CHANGED_FILES" | sed '/^$/d' | wc -l | tr -d ' ')
          echo "[deploy] Changed files: ${CHANGED_FILE_COUNT}"

          BUNDLE_DEPS_CHANGED=false
          YARN_DEPS_CHANGED=false
          ASSETS_CHANGED=false
          MIGRATIONS_CHANGED=false

          while IFS= read -r changed_file; do
            [ -n "$changed_file" ] || continue

            case "$changed_file" in
              Gemfile|Gemfile.lock)
                BUNDLE_DEPS_CHANGED=true
                ;;
            esac

            case "$changed_file" in
              package.json|yarn.lock)
                YARN_DEPS_CHANGED=true
                ;;
            esac

            case "$changed_file" in
              app/assets/*|app/javascript/*|app/packs/*|config/webpack/*|config/webpacker.yml|config/initializers/assets.rb|package.json|yarn.lock)
                ASSETS_CHANGED=true
                ;;
            esac

            case "$changed_file" in
              db/migrate/*)
                MIGRATIONS_CHANGED=true
                ;;
            esac
          done <<< "$CHANGED_FILES"

          BUNDLE_STARTED_AT=$(date +%s)
          log_step_start "bundle check/install"
          ~/.rbenv/shims/bundle config set deployment 'true'
          ~/.rbenv/shims/bundle config set without 'development test'
          if ~/.rbenv/shims/bundle check; then
            echo "[deploy] Skip bundle install: bundle check passed"
          elif [ "$BUNDLE_DEPS_CHANGED" = "true" ]; then
            echo "[deploy] bundle install required: Gemfile/Gemfile.lock changed"
            ~/.rbenv/shims/bundle install --jobs 4 --retry 3
          else
            echo "[deploy] bundle install required: bundle check failed even though Gemfile/Gemfile.lock did not change"
            ~/.rbenv/shims/bundle install --jobs 4 --retry 3
          fi
          log_step_finish "bundle check/install" "$BUNDLE_STARTED_AT"

          YARN_STARTED_AT=$(date +%s)
          log_step_start "yarn check/install"
          if [ "$YARN_DEPS_CHANGED" = "true" ]; then
            echo "[deploy] yarn install required: package.json/yarn.lock changed"
            bin/yarn install --frozen-lockfile
          else
            echo "[deploy] Skip yarn install: package.json/yarn.lock unchanged"
          fi
          log_step_finish "yarn check/install" "$YARN_STARTED_AT"

          ASSETS_STARTED_AT=$(date +%s)
          log_step_start "assets check/precompile"
          BACKUP_DIR="/tmp/be-my-style-assets-backup-$(date +%Y%m%d%H%M%S)"
          FORCE_CLOBBER="${FORCE_ASSETS_CLOBBER:-false}"
          SHOULD_PRECOMPILE_ASSETS=false

          if [ "$FORCE_CLOBBER" = "true" ]; then
            SHOULD_PRECOMPILE_ASSETS=true
            echo "[deploy] assets:precompile required: FORCE_ASSETS_CLOBBER=true"
          elif [ "$ASSETS_CHANGED" = "true" ]; then
            SHOULD_PRECOMPILE_ASSETS=true
            echo "[deploy] assets:precompile required: asset-related changes detected"
          else
            echo "[deploy] Skip assets:precompile: no asset-related changes"
          fi

          if [ "$FORCE_CLOBBER" = "true" ]; then
            echo "[deploy] FORCE_ASSETS_CLOBBER=true: backing up assets before clobber"
            mkdir -p "$BACKUP_DIR"
            [ -d public/assets ] && cp -a public/assets "$BACKUP_DIR/assets"
            [ -d public/packs ] && cp -a public/packs "$BACKUP_DIR/packs"
            echo "[deploy] assets backup finished: $BACKUP_DIR"

            echo "[deploy] assets:clobber start: $(date '+%H:%M:%S')"
            RAILS_ENV=production ~/.rbenv/shims/bundle exec rails assets:clobber
            echo "[deploy] assets:clobber finished: $(date '+%H:%M:%S')"
          fi

          if [ "$SHOULD_PRECOMPILE_ASSETS" = "true" ]; then
            echo "[deploy] assets:precompile start: $(date '+%H:%M:%S')"
            (RAILS_ENV=production ~/.rbenv/shims/bundle exec rails assets:precompile) &
            PRECOMPILE_PID=$!
            while kill -0 "$PRECOMPILE_PID" 2>/dev/null; do
              echo "[deploy] assets:precompile still running: $(date '+%H:%M:%S')"
              sleep 30
            done

            if wait "$PRECOMPILE_PID"; then
              echo "[deploy] assets:precompile finished: $(date '+%H:%M:%S')"
              if [ "$FORCE_CLOBBER" = "true" ] && [ -d "$BACKUP_DIR" ]; then
                rm -rf "$BACKUP_DIR"
                echo "[deploy] assets backup deleted"
              fi
            else
              echo "[deploy] ERROR: assets:precompile FAILED. Aborting deploy."
              if [ "$FORCE_CLOBBER" = "true" ] && [ -d "$BACKUP_DIR" ]; then
                echo "[deploy] Restoring assets from backup: $BACKUP_DIR"
                rm -rf public/assets public/packs
                [ -d "$BACKUP_DIR/assets" ] && cp -a "$BACKUP_DIR/assets" public/assets
                [ -d "$BACKUP_DIR/packs" ] && cp -a "$BACKUP_DIR/packs" public/packs
                echo "[deploy] Assets restored. Existing assets preserved."
              else
                echo "[deploy] Existing assets preserved."
              fi
              exit 1
            fi
          fi
          log_step_finish "assets check/precompile" "$ASSETS_STARTED_AT"

          MIGRATE_STARTED_AT=$(date +%s)
          log_step_start "db:migrate"
          if [ "$MIGRATIONS_CHANGED" = "true" ]; then
            echo "[deploy] db:migrate required: db/migrate changed"
            RAILS_ENV=production ~/.rbenv/shims/bundle exec rails db:migrate
          else
            echo "[deploy] Skip db:migrate: db/migrate unchanged"
          fi
          log_step_finish "db:migrate" "$MIGRATE_STARTED_AT"

          PUMA_STARTED_AT=$(date +%s)
          log_step_start "puma restart"
          sudo systemctl restart puma
          log_step_finish "puma restart" "$PUMA_STARTED_AT"
          sudo systemctl status puma --no-pager --lines=20

          DEPLOY_FINISHED_AT=$(date +%s)
          echo "[deploy] END: $(date '+%H:%M:%S') ($((DEPLOY_FINISHED_AT - DEPLOY_STARTED_AT))s)"
          echo "Deploy completed successfully."
        EOF

        rm -f private_key
